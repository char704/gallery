name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: framehub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/framehub_test
      JWT_SECRET: test_secret_key_at_least_32_characters_long
      JWT_EXPIRY: 7d
      CLOUDINARY_CLOUD_NAME: test_cloud
      CLOUDINARY_API_KEY: test_key
      CLOUDINARY_API_SECRET: test_secret
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:deploy

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

  client:
    name: Client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    env:
      VITE_API_BASE_URL: http://localhost:5000/api
      VITE_CLOUDINARY_CLOUD_NAME: test_cloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present
